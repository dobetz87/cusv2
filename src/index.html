<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cus — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    /* tweakable */
    --primary: #E67E22;
    --primary-hover: #CA6916;
    --primary-light: #FCEFE3;

    --secondary: #2C3E50;
    --secondary-light: #34495E;

    --bg: #FAF9F7;
    --surface: #FFFFFF;
    --border: rgba(44,62,80,0.10);
    --border-strong: rgba(44,62,80,0.18);

    --text-primary: #2C3E50;
    --text-secondary: rgba(44,62,80,0.70);
    --text-muted: rgba(44,62,80,0.45);

    --success: #27AE60;
    --warning: #F39C12;
    --error: #E94560;

    --order-cepat-gradient: linear-gradient(135deg, #FF6B35 0%, #F7931E 100%);
    --gateway-gradient: linear-gradient(170deg, #E67E22 0%, #D35400 60%, #BF4904 100%);

    --card-shadow: 0 1px 3px rgba(44,62,80,0.06), 0 4px 12px rgba(44,62,80,0.04);
    --card-shadow-md: 0 6px 16px rgba(44,62,80,0.08), 0 2px 4px rgba(44,62,80,0.04);

    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: 'DM Sans', -apple-system, system-ui, sans-serif;
    color: var(--text-primary);
    background: #F0EBE3;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  button { font-family: inherit; }
  input, textarea { font-family: inherit; }

  /* Hide scrollbars in webkit for in-frame scroll containers */
  [data-screen-scroll] *::-webkit-scrollbar { width: 0; height: 0; display: none; }
  [data-screen-scroll] * { scrollbar-width: none; }

  @keyframes screenIn {
    from { opacity: 0; transform: translateX(8px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; } to { opacity: 1; }
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translate(-50%, 8px); }
    to { opacity: 1; transform: translate(-50%, 0); }
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 color-mix(in oklab, var(--primary) 40%, transparent); }
    50% { box-shadow: 0 0 0 8px color-mix(in oklab, var(--primary) 0%, transparent); }
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes sheetIn {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="screens-1.jsx"></script>
<script type="text/babel" src="screens-2.jsx"></script>
<script type="text/babel" src="screens-3.jsx"></script>
<script type="text/babel" src="screens-4.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
